# ──────────────────────────────────────────────── #
#                General Variables                 #
# ──────────────────────────────────────────────── #

# Modifier keys
$mainMod = SUPER
$shiftMod = SUPERSHIFT
$ctrlMod = SUPERCTRL
$altmod = SUPERALT

# Terminal application
$terminal = kitty

# File manager
$fileManager = nautilus

# Wallpaper front-end
$wallpaperFrontend = waypaper --restore

# Wallpaper back-end
$wallpaperBackend = swww init

# Wallpaper picker
$wallpaperPicker = waypaper

# Browser
$browser = librewolf

# Code IDE
$codeIDE = $terminal -e nvim

# Screenshot manager (mode: save)
$saveScreenshot = hyprshot -m region

# Screenshot manager (mode: copy)
$copyScreenshot = hyprshot -m region --clipboard-only

# Notification manager
$notifManager = dunst

# Notifications listener script
$notifListener = ~/scripts/notifs/notif-listener.sh

# App launcher
$appLauncher = rofi -show drun -theme ~/.config/rofi/config.rasi

# Emoji picker
$emojiPicker = flatpak run it.mijorus.smile

# Power menu
$powerMenu = wlogout
