# ────────────────────────────────────────────────────────── #
source = ~/.config/hypr/conf/variables.conf                  #
# ────────────────────────────────────────────────────────── #

# ────────────────────────────────────────────────────────── #
#                  Software & Applications                   # 
# ────────────────────────────────────────────────────────── #

# Keybind: Terminal
bind = $mainMod, Return, exec, $terminal

# Keybind: App launcher
bind = $mainMod, Space, exec, $appLauncher

# Keybind: File manager
bind = $mainMod, E, exec, $fileManager

# Keybind: Emoji picker
bind = $mainMod, Q, exec, $emojiPicker

# Keybind: Screenshot manager (save screenshot)
bind = $mainMod, X, exec, $saveScreenshot

# Keybind: Screenshot manager (copy screenshot)
bind = $mainMod, C, exec, $copyScreenshot

# Keybind: Wallpaper picker
bind = $mainMod, M, exec, $wallpaperPicker

# Keybind: Browser
bind = $mainMod, B, exec, $browser

# Keybind: Code IDE
bind = $mainMod, N, exec, $codeIDE


# ────────────────────────────────────────────────────────── #
#                     Window Management                      #
# ────────────────────────────────────────────────────────── #

# Keybind: Kill active window
bind = $mainMod, K, killactive

# Keybind: Toggle fullscreen for active window
bind = $mainMod, F, fullscreen

# Keybind: Move active window to other monitor
bind = $mainMod, Z, movewindow, mon:+1

# Keybind: Toggle floating
bind = $shiftMod, F, togglefloating

# ────────────────────────────────────────────────────────── #
#                        Workspaces                          #
# ────────────────────────────────────────────────────────── #

# Keybinds: Switch to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Keybinds: Move active window to workspace
bind = $shiftMod, 1, movetoworkspace, 1
bind = $shiftMod, 2, movetoworkspace, 2
bind = $shiftMod, 3, movetoworkspace, 3
bind = $shiftMod, 4, movetoworkspace, 4
bind = $shiftMod, 5, movetoworkspace, 5
bind = $shiftMod, 6, movetoworkspace, 6
bind = $shiftMod, 7, movetoworkspace, 7
bind = $shiftMod, 8, movetoworkspace, 8

# Keybind: Move window to workspace (silent)
bind = $shiftMod, 1, movetoworkspacesilent, 9

# ────────────────────────────────────────────────────────── #
#                  Audio & Volume Controls                   #
# ────────────────────────────────────────────────────────── #

# Keybind: Increase volume by 5%
bind = $mainMod, U, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%

# Keybind: Decrease volume by 5%
bind = $mainMod, I, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%

# Keybind: Toggle volume mute
bind = $mainMod, O, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# ────────────────────────────────────────────────────────── #
#                    System & Management                     #
# ────────────────────────────────────────────────────────── #

# Keybind: Open power menu
bind = $mainMod, P, exec, $powerMenu
