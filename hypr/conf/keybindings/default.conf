# ----------------------------------------------------------

# Terminal keybind
bind = $mainMod, Return, exec, $terminal

# Rofi keybind
bind = $mainMod, Space, exec,  $menu

# File manager keybind
bind = $mainMod, Q, $fileManager

# Kill active window keybind
bind = $mainMod, K, killactive

# Toggle fullscreen keybind
bind = $mainMod, F, fullscreen

# Take screenshot keybind
bind = , Print, exec, hyprshot -m region

# Emoji picker keybind
bind = $mainMod, E, exec, ~/scripts/smile-emojis.sh

# Move window to other monitor
bind = $mainMod, X, movewindow, mon:+1

# Increase volume keybind
bind = $mainMod, U, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%

# Decrease volume keybind
bind = $mainMod, I, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%

# Toggle 'mute volume' keybind
bind = $mainMod, O, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
